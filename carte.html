<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1"/>
<title>Marathon — Méthodes de paiement</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600;700&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet"/>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--red:#C41C1C;--rd:#9E1616;--cr:#F7F2EC;--mu:#8A7070;--bo:rgba(196,28,28,.12);--t1:#1A1212;--t2:#4A3A3A}
body{font-family:"DM Sans",sans-serif;background:var(--cr);color:var(--t1);min-height:100vh;padding-bottom:30px}
.topbar{background:linear-gradient(135deg,var(--rd),var(--red));padding:44px 16px 16px;display:flex;align-items:center;gap:12px}
.back{background:rgba(255,255,255,.18);border:none;border-radius:10px;width:36px;height:36px;display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0}
.back svg{width:20px;height:20px;stroke:#fff;fill:none;stroke-width:2.5}
.topbar h1{font-family:"Cormorant Garamond",serif;font-size:24px;font-weight:600;color:#fff}
.topbar p{color:rgba(255,255,255,.72);font-size:12px;margin-top:2px}
.content{padding:16px}
.section-title{font-size:11px;color:var(--mu);font-weight:700;letter-spacing:.12em;text-transform:uppercase;margin-bottom:10px;padding-left:2px}
/* Cards existantes */
.existing-card{background:#fff;border-radius:13px;padding:14px;border:1px solid var(--bo);margin-bottom:10px;display:flex;align-items:center;gap:12px;box-shadow:0 2px 8px rgba(0,0,0,.04)}
.ec-icon{width:44px;height:44px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:22px;flex-shrink:0}
.ec-name{font-size:13.5px;font-weight:600;color:var(--t1)}
.ec-detail{font-size:11.5px;color:var(--mu);margin-top:2px}
.ec-default{background:#F0FFF4;color:#166534;font-size:9.5px;font-weight:700;padding:2px 8px;border-radius:20px;margin-top:4px;display:inline-block}
.del-btn{background:none;border:none;cursor:pointer;padding:6px;border-radius:8px;flex-shrink:0}
.del-btn svg{width:18px;height:18px;stroke:#EF4444;fill:none;stroke-width:2}
/* Form */
.card-form{background:#fff;border-radius:14px;padding:18px;border:1px solid var(--bo);box-shadow:0 2px 10px rgba(0,0,0,.05)}
.card-form h3{font-family:"Cormorant Garamond",serif;font-size:19px;font-weight:600;color:var(--t1);margin-bottom:16px}
.field{margin-bottom:14px}
.field label{display:block;font-size:11px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;color:var(--t2);margin-bottom:6px}
.field input,.field select{width:100%;padding:12px 14px;border:1.5px solid var(--bo);border-radius:11px;font-family:"DM Sans",sans-serif;font-size:14px;color:var(--t1);background:var(--cr);outline:none;transition:all .2s}
.field input:focus,.field select:focus{border-color:var(--red);background:#fff;box-shadow:0 0 0 3px rgba(196,28,28,.1)}
/* Country selector custom */
.country-row{display:flex;align-items:center;gap:10px;background:var(--cr);border:1.5px solid var(--bo);border-radius:11px;padding:4px 14px 4px 4px;transition:all .2s}
.country-row:focus-within{border-color:var(--red);background:#fff}
.country-flag{font-size:22px;width:36px;text-align:center;flex-shrink:0}
.country-row select{flex:1;border:none;background:transparent;outline:none;font-family:"DM Sans",sans-serif;font-size:13.5px;color:var(--t1);padding:9px 0;cursor:pointer}
/* Method pills */
.method-pills{display:flex;flex-direction:column;gap:8px;margin-top:6px}
.method-pill{display:flex;align-items:center;gap:12px;padding:11px 13px;border:1.5px solid var(--bo);border-radius:11px;cursor:pointer;transition:all .2s;background:#fff}
.method-pill.on{border-color:var(--red);background:#FFF8F8}
.mp-radio{width:18px;height:18px;border-radius:50%;border:2px solid var(--bo);flex-shrink:0;position:relative;transition:all .2s}
.method-pill.on .mp-radio{border-color:var(--red);background:var(--red)}
.method-pill.on .mp-radio::after{content:"";position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:6px;height:6px;background:#fff;border-radius:50%}
.mp-name{font-size:13.5px;font-weight:500;color:var(--t1)}
/* Phone row */
.phone-row{display:flex;gap:8px}
.dial-badge{background:var(--cr);border:1.5px solid var(--bo);border-radius:11px;padding:12px 12px;font-size:13px;font-weight:700;color:var(--t1);white-space:nowrap;flex-shrink:0;min-width:70px;text-align:center}
.phone-row input{flex:1}
/* Buttons */
.btn{width:100%;padding:13px;border-radius:12px;border:none;cursor:pointer;font-family:"DM Sans",sans-serif;font-size:14px;font-weight:600;background:linear-gradient(135deg,var(--red),var(--rd));color:#fff;margin-top:6px}
.btn:active{transform:scale(.98)}
.btn:disabled{opacity:.6;cursor:not-allowed}
.spin{width:15px;height:15px;border:2px solid rgba(255,255,255,.35);border-top-color:#fff;border-radius:50%;animation:sp .6s linear infinite;display:inline-block;margin-right:6px;vertical-align:middle}
@keyframes sp{to{transform:rotate(360deg)}}
.alert{padding:11px 13px;border-radius:10px;font-size:13px;margin-bottom:14px;display:none}
.alert.err{display:block;background:#FFF0F0;color:var(--red);border:1px solid #FFCCCC}
.alert.ok{display:block;background:#F0FFF4;color:#166534;border:1px solid #BBF7D0}
#toast{position:fixed;top:16px;left:50%;transform:translateX(-50%) translateY(-70px);background:var(--t1);color:#fff;padding:10px 18px;border-radius:30px;font-size:13px;font-weight:500;z-index:9999;transition:transform .3s;white-space:nowrap;max-width:88vw;pointer-events:none}
#toast.show{transform:translateX(-50%) translateY(0)}
</style>
</head>
<body>
<div id="toast"></div>
<div class="topbar">
  <button class="back" onclick="window.location.href='dashboard.html'">
    <svg viewBox="0 0 24 24"><polyline points="15 18 9 12 15 6"/></svg>
  </button>
  <div><h1>Méthodes de paiement</h1><p>Compte Mobile Money pour dépôts et retraits</p></div>
</div>

<div class="content">
  <div id="existing-section" style="display:none">
    <div class="section-title">Comptes enregistrés</div>
    <div id="cards-list"></div>
  </div>

  <div class="card-form">
    <h3>Ajouter un compte</h3>
    <div class="alert" id="al"></div>

    <div class="field">
      <label>Pays</label>
      <div class="country-row">
        <div class="country-flag" id="flag-display">🌍</div>
        <select id="country-select" onchange="onCountryChange()">
          <option value="">Choisissez votre pays</option>
          <option value="TG" data-dial="+228" data-flag="🇹🇬">Togo (+228)</option>
          <option value="BJ" data-dial="+229" data-flag="🇧🇯">Bénin (+229)</option>
          <option value="BF" data-dial="+226" data-flag="🇧🇫">Burkina Faso (+226)</option>
          <option value="CI" data-dial="+225" data-flag="🇨🇮">Côte d Ivoire (+225)</option>
          <option value="CM" data-dial="+237" data-flag="🇨🇲">Cameroun (+237)</option>
          <option value="SN" data-dial="+221" data-flag="🇸🇳">Sénégal (+221)</option>
          <option value="NE" data-dial="+227" data-flag="🇳🇪">Niger (+227)</option>
        </select>
      </div>
    </div>

    <div class="field" id="method-field" style="display:none">
      <label>Méthode Mobile Money</label>
      <div class="method-pills" id="method-pills"></div>
    </div>

    <div class="field">
      <label>Numéro de téléphone</label>
      <div class="phone-row">
        <div class="dial-badge" id="dial-badge">—</div>
        <input type="tel" id="phone-input" placeholder="XX XX XX XX XX"/>
      </div>
    </div>

    <div class="field">
      <label>Nom du titulaire</label>
      <input type="text" id="holder-input" placeholder="Votre nom complet"/>
    </div>

    <button class="btn" id="save-btn" onclick="saveCard()">Enregistrer ce compte</button>
  </div>
</div>

<script>
var sb = null, currentUser = null;
try {
  sb = supabase.createClient('https://mzxxfxkryhxnycewyryv.supabase.co', 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im16eHhmeGtyeWh4bnljZXd5cnl2Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzk1OTE0NTUsImV4cCI6MjA5NTE2NzQ1NX0.LrdnZCvNDViY5fyh0LEh4HHPTYjN_DI7knjfTIUL8cc');
} catch(e) {}

var METHODS = {
  TG: ['Flooz (Moov)', 'T-Money'],
  BJ: ['MTN Mobile Money', 'Moov Money'],
  BF: ['Orange Money', 'Mobicash'],
  CI: ['Orange Money', 'MTN Mobile Money', 'Wave', 'Moov Money'],
  CM: ['MTN Mobile Money', 'Orange Money'],
  SN: ['Orange Money', 'Wave', 'Free Money'],
  NE: ['Airtel Money', 'Moov Money']
};

var selectedMethod = null;

window.addEventListener('DOMContentLoaded', async function() {
  try {
    if (!sb) return;
    var s = await sb.auth.getSession();
    if (!s.data || !s.data.session) { window.location.href = 'index.html'; return; }
    currentUser = s.data.session.user;
    var m = currentUser.user_metadata || {};
    if (m.full_name) document.getElementById('holder-input').value = m.full_name;
    loadCards();
  } catch(e) {}
});

function toast(msg) {
  var t = document.getElementById('toast'); t.textContent = msg; t.classList.add('show');
  setTimeout(function(){ t.classList.remove('show'); }, 2600);
}

function showAlert(msg, type) {
  var el = document.getElementById('al');
  el.className = 'alert ' + (type || 'err');
  el.textContent = msg;
}

function onCountryChange() {
  var sel = document.getElementById('country-select');
  var opt = sel.options[sel.selectedIndex];
  var code = opt.value;
  var dial = opt.getAttribute('data-dial') || '';
  var flag = opt.getAttribute('data-flag') || '🌍';
  document.getElementById('flag-display').textContent = flag;
  document.getElementById('dial-badge').textContent = dial || '—';
  selectedMethod = null;
  var mf = document.getElementById('method-field');
  var mp = document.getElementById('method-pills');
  if (!code || !METHODS[code]) { mf.style.display = 'none'; return; }
  mf.style.display = 'block';
  mp.innerHTML = METHODS[code].map(function(m) {
    return '<div class="method-pill" onclick="selectMethod(this, \'' + m + '\')">'
      + '<div class="mp-radio"></div>'
      + '<div class="mp-name">' + m + '</div>'
      + '</div>';
  }).join('');
}

function selectMethod(el, name) {
  document.querySelectorAll('.method-pill').forEach(function(p){ p.classList.remove('on'); });
  el.classList.add('on');
  selectedMethod = name;
}

async function loadCards() {
  try {
    var r = await sb.from('payment_methods').select('*').eq('user_id', currentUser.id).order('created_at', {ascending: false});
    var list = document.getElementById('cards-list');
    var section = document.getElementById('existing-section');
    if (!r.data || r.data.length === 0) { section.style.display = 'none'; return; }
    section.style.display = 'block';
    var FLAGS = {'+228':'🇹🇬','+229':'🇧🇯','+226':'🇧🇫','+225':'🇨🇮','+237':'🇨🇲','+221':'🇸🇳','+227':'🇳🇪'};
    list.innerHTML = r.data.map(function(c) {
      var flag = FLAGS[c.country_code] || '📱';
      return '<div class="existing-card">'
        + '<div class="ec-icon" style="background:rgba(196,28,28,.08)">' + flag + '</div>'
        + '<div style="flex:1">'
        + '<div class="ec-name">' + c.method + '</div>'
        + '<div class="ec-detail">' + (c.country_code||'') + ' ' + (c.phone||'') + ' · ' + (c.holder_name||'') + '</div>'
        + (c.is_default ? '<span class="ec-default">✓ Principal</span>' : '')
        + '</div>'
        + '<button class="del-btn" data-id="' + c.id + '" onclick="deleteCard(this)">'
        + '<svg viewBox="0 0 24 24"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14H6L5 6"/><path d="M10 11v6M14 11v6"/></svg>'
        + '</button></div>';
    }).join('');
  } catch(e) { console.warn(e); }
}

async function deleteCard(btn) {
  var id = btn.getAttribute('data-id');
  if (!confirm('Supprimer ce compte ?')) return;
  try {
    await sb.from('payment_methods').delete().eq('id', id);
    toast('Compte supprimé');
    loadCards();
  } catch(e) { toast('Erreur lors de la suppression'); }
}

async function saveCard() {
  var sel = document.getElementById('country-select');
  var opt = sel.options[sel.selectedIndex];
  var countryCode = opt.value;
  var dialCode = opt.getAttribute('data-dial') || '';
  var countryName = opt.text ? opt.text.replace(/\s*\(.*\)/, '').trim() : '';
  var phone = document.getElementById('phone-input').value.trim();
  var holder = document.getElementById('holder-input').value.trim();

  if (!countryCode) return showAlert('Choisissez votre pays');
  if (!selectedMethod) return showAlert('Choisissez la méthode Mobile Money');
  if (!phone) return showAlert('Entrez votre numéro de téléphone');
  if (!holder) return showAlert('Entrez votre nom complet');

  var btn = document.getElementById('save-btn');
  btn.disabled = true;
  btn.innerHTML = '<span class="spin"></span>Enregistrement...';

  try {
    await sb.from('payment_methods').update({is_default: false}).eq('user_id', currentUser.id);
    var r = await sb.from('payment_methods').insert({
      user_id: currentUser.id,
      country: countryName,
      country_code: dialCode,
      method: selectedMethod,
      phone: phone,
      holder_name: holder,
      is_default: true
    });
    if (r.error) throw r.error;
    toast('Compte enregistré avec succès ✓');
    showAlert('Compte enregistré ! Vous pouvez maintenant effectuer des retraits.', 'ok');
    loadCards();
    document.getElementById('country-select').value = '';
    document.getElementById('flag-display').textContent = '🌍';
    document.getElementById('dial-badge').textContent = '—';
    document.getElementById('phone-input').value = '';
    document.getElementById('method-field').style.display = 'none';
    selectedMethod = null;
    var params = new URLSearchParams(window.location.search);
    if (params.get('from') === 'retrait') {
      setTimeout(function(){ window.location.href = 'retrait.html'; }, 1500);
    }
  } catch(e) {
    showAlert('Erreur : ' + (e.message || 'Réessayez'));
  }
  btn.disabled = false;
  btn.textContent = 'Enregistrer ce compte';
}
</script>
</body>
</html>
