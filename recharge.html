<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1"/>
<title>Marathon — Recharge</title>

<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600;700&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet"/>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--red:#C41C1C;--rd:#9E1616;--cr:#F7F2EC;--mu:#8A7070;--bo:rgba(196,28,28,.12);--t1:#1A1212;--t2:#4A3A3A}
body{font-family:"DM Sans",sans-serif;background:var(--cr);color:var(--t1);min-height:100vh;padding-bottom:40px}
.topbar{background:linear-gradient(135deg,var(--rd),var(--red));padding:44px 16px 16px;display:flex;align-items:center;gap:12px}
.back{background:rgba(255,255,255,.18);border:none;border-radius:10px;width:36px;height:36px;display:flex;align-items:center;justify-content:center;cursor:pointer}
.back svg{width:20px;height:20px;stroke:#fff;fill:none;stroke-width:2.5}
.content{padding:16px}
.card{background:#fff;border-radius:14px;padding:18px;border:1px solid var(--bo)}
.pay-btn{width:100%;padding:15px;border-radius:13px;border:none;cursor:pointer;font-weight:700;background:linear-gradient(135deg,var(--red),var(--rd));color:#fff}
</style>
</head>

<body>

<div class="topbar">
  <button class="back" onclick="window.location.href='dashboard.html'">
    <svg viewBox="0 0 24 24"><polyline points="15 18 9 12 15 6"/></svg>
  </button>
  <div>
    <h1>Recharger mon compte</h1>
    <p>Paiement sécurisé via LeekPay</p>
  </div>
</div>

<div class="content">

  <div class="card">
    <h3>Montant</h3>

    <input type="number" id="amount" placeholder="Minimum 3000 FCFA" min="3000"
      style="width:100%;padding:12px;margin-top:10px;border-radius:10px;border:1px solid #ddd"/>

    <button class="pay-btn" onclick="payWithLeekPay()" style="margin-top:15px">
      Payer avec LeekPay
    </button>
  </div>

</div>

<script>
const sb = supabase.createClient(
  'https://mzxxfxkryhxnycewyryv.supabase.co',
  'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im16eHhmeGtyeWh4bnljZXd5cnl2Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzk1OTE0NTUsImV4cCI6MjA5NTE2NzQ1NX0.LrdnZCvNDViY5fyh0LEh4HHPTYjN_DI7knjfTIUL8cc'
);

let user = null;

/* =========================
   LEEKPAY CONFIG
   ========================= */
const LEEKPAY_PUBLIC_KEY = "pk_live_h0RQu365IhnhdXkW2YeWZiDmKQGo7Pn1";
const LEEKPAY_URL = "https://api.leekpay.com/v1/pay";

window.addEventListener("DOMContentLoaded", async () => {
  const { data } = await sb.auth.getSession();
  if (!data.session) return window.location.href = "index.html";
  user = data.session.user;
});

/* =========================
   PAYMENT FUNCTION
   ========================= */
function payWithLeekPay() {
  const amount = parseInt(document.getElementById("amount").value);

  if (!amount || amount < 3000) {
    alert("Montant minimum 3000 FCFA");
    return;
  }

  const payload = {
    amount: amount,
    currency: "XOF",
    customer: {
      id: user.id,
      email: user.email
    },
    metadata: {
      source: "marathon_app"
    },
    return_url: window.location.origin + "/recharge.html?status=success",
    cancel_url: window.location.origin + "/recharge.html?status=cancel"
  };

  fetch(LEEKPAY_URL, {
    method: "POST",
    headers: {
      "Content-Type": "application/json",
      "Authorization": "Bearer " + LEEKPAY_PUBLIC_KEY
    },
    body: JSON.stringify(payload)
  })
  .then(res => res.json())
  .then(data => {
    if (data?.payment_url) {
      window.location.href = data.payment_url;
    } else {
      alert("Erreur LeekPay");
    }
  })
  .catch(err => {
    console.error(err);
    alert("Erreur réseau");
  });
}
</script>

</body>
</html>
