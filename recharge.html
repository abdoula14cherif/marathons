<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1"/>
<title>Marathon — Recharge</title>

<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600;700&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet"/>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--red:#C41C1C;--rd:#9E1616;--cr:#F7F2EC;--mu:#8A7070;--bo:rgba(196,28,28,.12);--t1:#1A1212;--t2:#4A3A3A}
body{font-family:"DM Sans",sans-serif;background:var(--cr);color:var(--t1);min-height:100vh;padding-bottom:40px}
.topbar{background:linear-gradient(135deg,var(--rd),var(--red));padding:44px 16px 16px;display:flex;align-items:center;gap:12px}
.back{background:rgba(255,255,255,.18);border:none;border-radius:10px;width:36px;height:36px;display:flex;align-items:center;justify-content:center;cursor:pointer}
.back svg{width:20px;height:20px;stroke:#fff;fill:none;stroke-width:2.5}
.topbar h1{font-family:"Cormorant Garamond",serif;font-size:24px;color:#fff}
.topbar p{color:rgba(255,255,255,.72);font-size:12px}
.content{padding:16px}

.bal-card,.card{background:#fff;border-radius:14px;padding:16px;border:1px solid var(--bo);margin-bottom:16px}
.bal-val{font-size:28px;font-weight:700;color:var(--red)}

.amount-display{text-align:center;padding:20px;background:var(--cr);border-radius:12px}
.amount-display .amt{font-size:42px;font-weight:700;color:var(--red)}

.presets{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-top:10px}
.preset{padding:10px;background:var(--cr);border-radius:10px;text-align:center;cursor:pointer}

.pay-btn{width:100%;padding:15px;border:none;border-radius:12px;
background:linear-gradient(135deg,var(--red),var(--rd));color:#fff;font-weight:700}
.pay-btn:disabled{opacity:.6}

.alert{display:none;padding:10px;border-radius:8px;margin-bottom:10px}
.alert.err{background:#ffe5e5;color:#b00000}
.alert.ok{background:#e7ffe7;color:#0a7a0a}

.success{display:none;text-align:center;padding:30px}
.success.on{display:block}
</style>
</head>

<body>

<div class="topbar">
  <button class="back" onclick="window.location.href='dashboard.html'">
    <svg viewBox="0 0 24 24"><polyline points="15 18 9 12 15 6"/></svg>
  </button>
  <div>
    <h1>Recharger mon compte</h1>
    <p>Paiement sécurisé via LeekPay</p>
  </div>
</div>

<div class="content">

  <div class="bal-card">
    <div>
      <div>Solde actuel</div>
      <div class="bal-val" id="bal-val">— FCFA</div>
    </div>
  </div>

  <div class="card">
    <h3>Choisir montant</h3>

    <div class="alert err" id="al"></div>

    <div class="amount-display">
      <div class="amt" id="amt-display">0</div>
      <div>FCFA</div>
    </div>

    <div class="presets">
      <div class="preset" onclick="setAmt(3000,this)">3000</div>
      <div class="preset" onclick="setAmt(6000,this)">6000</div>
      <div class="preset" onclick="setAmt(10000,this)">10000</div>
      <div class="preset" onclick="setAmt(20000,this)">20000</div>
      <div class="preset" onclick="setAmt(50000,this)">50000</div>
      <div class="preset" onclick="setAmt(100000,this)">100000</div>
    </div>

    <input type="number" id="custom-input" placeholder="Autre montant" oninput="onCustom()"
      style="width:100%;padding:10px;margin-top:10px;border-radius:10px;border:1px solid #ddd"/>

    <button class="pay-btn" id="pay-btn" onclick="startPayment()" disabled>
      Payer avec LeekPay
    </button>
  </div>

</div>

<script>
let sb=null,currentUser=null,selectedAmount=0;

const $=id=>document.getElementById(id);

sb = supabase.createClient(
  "https://mzxxfxkryhxnycewyryv.supabase.co",
  "SUPABASE_ANON_KEY"
);

/* 🔐 LEEKPAY CONFIG (NE PAS METTRE DE CLÉ SECRÈTE ICI) */
const LEEKPAY_PUBLIC_KEY = "YOUR_PUBLIC_KEY";
const LEEKPAY_BASE_URL = "https://api.leekpay.com/pay"; // à adapter selon doc

window.addEventListener('DOMContentLoaded', async () => {
  const {data:{session}} = await sb.auth.getSession();
  if(!session) return window.location.href="index.html";
  currentUser=session.user;

  const {data:p}=await sb.from('profiles').select('balance').eq('id',currentUser.id).single();
  if(p) $("bal-val").textContent=p.balance.toLocaleString()+" FCFA";
});

function setAmt(v,el){
  selectedAmount=v;
  $("amt-display").textContent=v.toLocaleString();
  document.querySelectorAll(".preset").forEach(e=>e.classList.remove("on"));
  el.classList.add("on");
  updateBtn(v);
}

function onCustom(){
  selectedAmount=parseInt($("custom-input").value)||0;
  $("amt-display").textContent=selectedAmount;
  updateBtn(selectedAmount);
}

function updateBtn(v){
  $("pay-btn").disabled=v<3000;
}

function showErr(msg){
  const el=$("al");
  el.style.display="block";
  el.textContent=msg;
}

function startPayment(){
  if(selectedAmount<3000) return showErr("Minimum 3000 FCFA");

  const payload={
    amount:selectedAmount,
    currency:"XOF",
    customer:{
      id:currentUser.id
    },
    return_url:window.location.origin+"/recharge.html?status=success&amount="+selectedAmount
  };

  const url=LEEKPAY_BASE_URL+"?data="+encodeURIComponent(JSON.stringify(payload))
    +"&key="+LEEKPAY_PUBLIC_KEY;

  window.location.href=url;
}
</script>

</body>
</html>
