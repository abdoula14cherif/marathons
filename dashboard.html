<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1"/>
<title>Marathon</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600;700&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet"/>

<style>
/* ====== TON CSS INCHANGÉ ====== */
/* (je ne répète pas tout ici pour éviter un message inutilement énorme,
   MAIS dans ton fichier réel il reste IDENTIQUE) */
</style>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>

<body>

<div id="toast"></div>
<input type="file" id="file-avatar" accept="image/*"/>

<div id="app">

<!-- ===== TON HTML RESTE INCHANGÉ ===== -->

</div>

<script>

// =======================
// SUPABASE INIT
// =======================
let sb = null;
let currentUser = null;   // ✅ FIX IMPORTANT
let currentBalance = 0;
let investData = null;

try {
  sb = supabase.createClient(
    'https://mzxxfxkryhxnycewyryv.supabase.co',
    'TON_ANON_KEY'
  );
} catch(e) {
  console.warn('Supabase error', e);
}

// =======================
// INIT APP
// =======================
window.addEventListener('DOMContentLoaded', async function() {

  startBanner();
  loadAvatar();

  if (!sb) return;

  try {
    const { data: sessionData } = await sb.auth.getSession();
    const session = sessionData?.session;

    if (!session) {
      window.location.href = 'index.html';
      return;
    }

    currentUser = session.user;

    const u = session.user;
    const m = u.user_metadata || {};

    const name = m.full_name || (u.email ? u.email.split('@')[0] : 'Utilisateur');
    const phone = m.phone_number || '——';
    const letter = name.charAt(0).toUpperCase();

    document.getElementById('hname').textContent = name;
    document.getElementById('hphone').textContent = phone;
    document.getElementById('avl').textContent = letter;

    document.getElementById('acn').textContent = name;
    document.getElementById('acp').textContent = phone;
    document.getElementById('ace').textContent = u.email || '——';
    document.getElementById('acav').textContent = letter;

    const code = 'MAR' + u.id.slice(-5).toUpperCase();
    document.getElementById('rcode').textContent = code;

    // =======================
    // PROFILE DATA
    // =======================
    const r = await sb
      .from('profiles')
      .select('balance,total_earnings,level,referral_code')
      .eq('id', u.id)
      .single();

    if (r.data) {
      currentBalance = r.data.balance || 0;

      document.getElementById('bal').innerHTML =
        currentBalance.toLocaleString('fr-FR') +
        ' <span style="font-size:11px;font-weight:400">FCFA</span>';

      document.getElementById('earn').innerHTML =
        (r.data.total_earnings || 0).toLocaleString('fr-FR') +
        ' <span style="font-size:11px;font-weight:400">FCFA</span>';

      document.getElementById('hlv').textContent = 'LV' + (r.data.level || 0);

      if (r.data.referral_code) {
        document.getElementById('rcode').textContent = r.data.referral_code;
      }
    }

    loadTeam(u.id); // ✅ FIX : suppression du ;;

    // =======================
    // REFERRALS
    // =======================
    const ref = await sb
      .from('referrals')
      .select('*')
      .eq('referrer_id', u.id);

    if (ref.data?.length) {

      document.getElementById('tcount').textContent = ref.data.length;

      const tot = ref.data.reduce((s, x) => s + (x.commission || 0), 0);
      document.getElementById('tcom').textContent =
        tot.toLocaleString('fr-FR') + ' F';

    }

  } catch (e) {
    console.warn(e);
  }
});

// =======================
// INVESTMENT FIXED
// =======================
async function doInvest() {

  // ✅ FIX sécurité
  if (!investData || !currentUser) return;

  if (currentBalance < investData.amount) {
    toast("Solde insuffisant");
    return;
  }

  const btn = document.getElementById('si-btn');
  btn.disabled = true;
  btn.textContent = "Traitement...";

  try {

    const ri = await sb.from('investments').insert({
      user_id: currentUser.id,
      plan_id: investData.id,
      plan_name: investData.name,
      amount: investData.amount,
      daily_revenue: investData.revenue,
      days_total: 100,
      days_remaining: 100,
      days_completed: 0,
      total_earned: 0,
      status: 'active'
    }).select().single();

    if (ri.error) throw ri.error;

    const newBal = currentBalance - investData.amount;

    await sb.from('profiles')
      .update({ balance: newBal })
      .eq('id', currentUser.id);

    currentBalance = newBal;

    document.getElementById('bal').innerHTML =
      newBal.toLocaleString('fr-FR') +
      ' <span style="font-size:11px;font-weight:400">FCFA</span>';

    toast("Investissement activé ✓");

    closeSheet();

  } catch (e) {
    console.error(e);
    toast("Erreur investissement");
    btn.disabled = false;
    btn.textContent = "Confirmer";
  }
}

// =======================
// TEAM (inchangé)
// =======================
async function loadTeam(userId) {
  try {
    const r = await sb.from('referrals')
      .select('*')
      .eq('referrer_id', userId);

    const data = r.data || [];

    document.getElementById('tcount').textContent = data.length;

  } catch (e) {
    console.warn(e);
  }
}

// =======================
// TOAST
// =======================
function toast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}

</script>

</body>
</html>
