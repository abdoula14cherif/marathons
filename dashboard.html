<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1"/>
<title>Marathon</title>

<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600;700&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet"/>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

body{
font-family:"DM Sans",sans-serif;
background:#F7F2EC;
color:#1A1212;
}

.page{display:none;min-height:100vh;padding:20px}
.page.on{display:block}

/* TOP */
.top{
background:linear-gradient(135deg,#9E1616,#C41C1C);
color:#fff;
padding:20px;
border-radius:0 0 20px 20px;
}

.top h1{
font-family:"Cormorant Garamond",serif;
}

/* CARD */
.card{
background:#fff;
border-radius:15px;
padding:15px;
margin-top:15px;
border:1px solid rgba(196,28,28,.1);
}

.btn{
padding:10px;
border:none;
border-radius:10px;
cursor:pointer;
font-weight:600;
}

.btn-red{background:#C41C1C;color:#fff}
.btn-green{background:#16A34A;color:#fff}
.btn-dark{background:#111;color:#fff}

input,select{
width:100%;
padding:10px;
margin-top:8px;
border-radius:10px;
border:1px solid #ddd;
}

</style>
</head>

<body>

<div id="app">

<div class="page on" id="home">

<div class="top">
<h1>Dashboard Marathon</h1>
<div>Solde: <b id="balance">0 FCFA</b></div>
</div>

<div class="card">
<h3>Investir</h3>

<select id="plan">
<option value="Starter|3000|400">Starter</option>
<option value="Bronze|6000|900">Bronze</option>
<option value="Silver|10000|1500">Silver</option>
<option value="Gold|20000|3500">Gold</option>
<option value="VIP|100000|20000">VIP</option>
</select>

<button class="btn btn-red" onclick="invest()">Investir maintenant</button>
</div>

<div class="card">
<h3>Admin test crédit</h3>
<input id="creditId" placeholder="User ID"/>
<input id="creditAmount" placeholder="Montant"/>
<button class="btn btn-green" onclick="adminCredit()">Créditer utilisateur</button>
</div>

</div>

</div>

<script>
const sb = supabase.createClient(
'https://mzxxfxkryhxnycewyryv.supabase.co',
'YOUR_KEY'
);

let currentUser = null;
let currentBalance = 0;

/* ======================
   INIT USER
====================== */
window.onload = async () => {
  const { data } = await sb.auth.getSession();
  const session = data?.session;

  if(!session){
    location.href="index.html";
    return;
  }

  currentUser = session.user;

  await loadUser();
};

/* ======================
   LOAD USER
====================== */
async function loadUser(){

  const { data } = await sb
    .from('profiles')
    .select('*')
    .eq('id', currentUser.id)
    .single();

  if(!data) return;

  currentBalance = data.balance || 0;

  document.getElementById('balance').innerText =
    currentBalance.toLocaleString() + " FCFA";
}

/* ======================
   INVEST FIXED
====================== */
async function invest(){

  const val = document.getElementById('plan').value.split('|');

  const name = val[0];
  const amount = Number(val[1]);
  const revenue = Number(val[2]);

  if(currentBalance < amount){
    alert("Solde insuffisant");
    return;
  }

  try {

    const { data: inv } = await sb.from('investments')
    .insert({
      user_id: currentUser.id,
      plan_name: name,
      amount,
      daily_revenue: revenue,
      status:"active"
    })
    .select()
    .single();

    const newBal = currentBalance - amount;

    await sb.from('profiles')
    .update({ balance: newBal })
    .eq('id', currentUser.id);

    await sb.from('transactions')
    .insert({
      user_id: currentUser.id,
      type:"investment",
      amount,
      status:"success"
    });

    const today = new Date().toISOString().split('T')[0];

    await sb.from('daily_tasks').insert({
      user_id: currentUser.id,
      investment_id: inv.id,
      task_date: today,
      reward_amount: revenue,
      status:"pending"
    });

    await loadUser();

    alert("Investissement activé");

  } catch(e){
    console.log(e);
    alert("Erreur investissement");
  }
}

/* ======================
   ADMIN CREDIT FIX SYNC
====================== */
async function adminCredit(){

  const id = document.getElementById('creditId').value;
  const amount = Number(document.getElementById('creditAmount').value);

  const { data } = await sb
    .from('profiles')
    .select('balance')
    .eq('id', id)
    .single();

  const newBal = (data?.balance || 0) + amount;

  await sb.from('profiles')
  .update({ balance: newBal })
  .eq('id', id);

  await sb.from('transactions').insert({
    user_id: id,
    type:"credit",
    amount,
    status:"success"
  });

  // IMPORTANT FIX: refresh UI si admin = user connecté
  if(id === currentUser.id){
    await loadUser();
  }

  alert("Utilisateur crédité");
}

</script>

</body>
</html>
