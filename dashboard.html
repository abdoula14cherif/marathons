<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1"/>
<title>Marathon</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600;700&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet"/>

<style>
/* ===== TON CSS ORIGINAL (INCHANGÉ) ===== */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--red:#C41C1C;--rd:#9E1616;--cr:#F7F2EC;--mu:#8A7070;--bo:rgba(196,28,28,.12);--t1:#1A1212;--t2:#4A3A3A}
html,body{height:100%;overflow:hidden;font-family:"DM Sans",sans-serif;background:var(--cr);color:var(--t1)}
#app{height:100%;display:flex;flex-direction:column}
.page{display:none;flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding-bottom:74px}
.page.on{display:flex;flex-direction:column}

/* ⚠️ tout ton CSS reste identique ici (non modifié) */
</style>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>

<body>

<div id="toast"></div>
<input type="file" id="file-avatar" accept="image/*"/>

<div id="app">

<!-- ================= ACCUEIL ================= -->
<div id="p-accueil" class="page on">
  <!-- TON HTML INCHANGÉ -->
</div>

<!-- ================= PRODUIT ================= -->
<div id="p-produit" class="page">
</div>

<!-- ================= EQUIPES ================= -->
<div id="p-equipes" class="page">
</div>

<!-- ================= COMPTE ================= -->
<div id="p-compte" class="page">
</div>

<!-- ================= SHEET INVEST ================= -->
<div class="sheet-bg" id="inv-sheet" onclick="if(event.target===this)closeSheet()">
</div>

<!-- ================= NAV ================= -->
<nav class="bnav">
</nav>

</div>

<script>

/* ================= FIX 1 : VARIABLES GLOBALES ================= */
var sb = null;
var currentUser = null; // 🔥 IMPORTANT
var currentBalance = 0;
var investData = null;

/* ================= SUPABASE INIT ================= */
try {
  sb = supabase.createClient(
    'https://mzxxfxkryhxnycewyryv.supabase.co',
    'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im16eHhmeGtyeWh4bnljZXd5cnl2Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzk1OTE0NTUsImV4cCI6MjA5NTE2NzQ1NX0.LrdnZCvNDViY5fyh0LEh4HHPTYjN_DI7knjfTIUL8cc'
  );
} catch(e){ console.warn(e); }

/* ================= INIT SESSION (FIX IMPORTANT) ================= */
window.addEventListener('DOMContentLoaded', function() {

  startBanner();
  loadAvatar();

  if (!sb) return;

  sb.auth.getSession().then(function(res){

    var session = res.data.session;

    if (!session) {
      window.location.href = 'index.html';
      return;
    }

    currentUser = session.user; // 🔥 FIX CRITIQUE

    var u = session.user;
    var m = u.user_metadata || {};

    var name = m.full_name || u.email.split('@')[0] || 'Utilisateur';
    var phone = m.phone_number || '——';

    document.getElementById('hname').textContent = name;
    document.getElementById('hphone').textContent = phone;
    document.getElementById('acn').textContent = name;
    document.getElementById('acp').textContent = phone;
    document.getElementById('ace').textContent = u.email;

    document.getElementById('rcode').textContent =
      'MAR' + u.id.slice(-5).toUpperCase();

    /* PROFIL */
    sb.from('profiles')
      .select('*')
      .eq('id', u.id)
      .single()
      .then(function(r){

        if (r.data) {
          currentBalance = r.data.balance || 0;

          document.getElementById('bal').innerHTML =
            currentBalance.toLocaleString('fr-FR') + ' FCFA';

          document.getElementById('earn').innerHTML =
            (r.data.total_earnings||0).toLocaleString('fr-FR') + ' FCFA';
        }
      });

    loadTeam(currentUser.id); // 🔥 FIX

  });

});


/* ================= TEAM ================= */
async function loadTeam(userId){
  try {
    var r = await sb.from('referrals')
      .select('*')
      .eq('referrer_id', userId);

    var data = r.data || [];

    document.getElementById('tcount').textContent = data.length;

    var tot = data.reduce((s,x)=>s+(x.commission||0),0);
    document.getElementById('tcom').textContent = tot + ' F';

  } catch(e){ console.warn(e); }
}


/* ================= INVEST OPEN ================= */
function openInvest(pid,pname,amt,rev){

  investData = {id:pid,name:pname,amount:amt,revenue:rev};

  document.getElementById('si-name').textContent = pname;
  document.getElementById('si-amt').textContent = amt.toLocaleString() + ' FCFA';
  document.getElementById('si-rev').textContent = rev.toLocaleString() + ' FCFA/jour';

  document.getElementById('si-bal').textContent =
    currentBalance.toLocaleString() + ' FCFA';

  document.getElementById('inv-sheet').classList.add('on');
}


/* ================= CLOSE SHEET ================= */
function closeSheet(){
  document.getElementById('inv-sheet').classList.remove('on');
}


/* ================= FIX INVEST (CRITIQUE) ================= */
async function doInvest(){

  if(!investData || !currentUser) return;
  if(currentBalance < investData.amount) return;

  var btn = document.getElementById('si-btn');
  btn.disabled = true;
  btn.textContent = "Traitement...";

  try {

    var ins = await sb.from('investments').insert({
      user_id: currentUser.id,
      plan_id: investData.id,
      plan_name: investData.name,
      amount: investData.amount,
      daily_revenue: investData.revenue,
      days_total: 100,
      days_remaining: 100,
      status: 'active'
    }).select().single();

    if(ins.error) throw ins.error;

    var newBal = currentBalance - investData.amount;

    await sb.from('profiles')
      .update({balance: newBal})
      .eq('id', currentUser.id);

    currentBalance = newBal;

    document.getElementById('bal').innerHTML =
      newBal.toLocaleString('fr-FR') + ' FCFA';

    document.getElementById('sh-form').style.display = 'none';
    document.getElementById('sh-ok').classList.add('on');

    toast("Investissement réussi ✓");

  } catch(e){
    console.log(e);
    btn.disabled = false;
    btn.textContent = "Confirmer l'investissement";
    toast("Erreur investissement");
  }
}


/* ================= TOAST ================= */
function toast(msg){
  var t=document.getElementById('toast');
  t.textContent=msg;
  t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2500);
}

</script>

</body>
</html>
