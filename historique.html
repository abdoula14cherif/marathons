<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1"/>
<title>Marathon — Historique</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600;700&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet"/>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--red:#C41C1C;--rd:#9E1616;--cr:#F7F2EC;--mu:#8A7070;--bo:rgba(196,28,28,.12);--t1:#1A1212;--t2:#4A3A3A}
body{font-family:"DM Sans",sans-serif;background:var(--cr);color:var(--t1);min-height:100vh;padding-bottom:30px}
.topbar{background:linear-gradient(135deg,var(--rd),var(--red));padding:44px 16px 16px;display:flex;align-items:center;gap:12px}
.back{background:rgba(255,255,255,.18);border:none;border-radius:10px;width:36px;height:36px;display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0}
.back svg{width:20px;height:20px;stroke:#fff;fill:none;stroke-width:2.5}
.topbar h1{font-family:"Cormorant Garamond",serif;font-size:24px;font-weight:600;color:#fff}
.topbar p{color:rgba(255,255,255,.72);font-size:12px;margin-top:2px}
.content{padding:16px}
.card{background:#fff;border-radius:14px;padding:16px;border:1px solid var(--bo);margin-bottom:14px;box-shadow:0 2px 10px rgba(0,0,0,.05)}
.field{margin-bottom:15px}
.field label{display:block;font-size:11px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;color:var(--t2);margin-bottom:6px}
.field input,.field select{width:100%;padding:12px 14px;border:1.5px solid var(--bo);border-radius:11px;font-family:"DM Sans",sans-serif;font-size:14px;color:var(--t1);background:var(--cr);outline:none;transition:all .2s}
.field input:focus{border-color:var(--red);background:#fff;box-shadow:0 0 0 3px rgba(196,28,28,.1)}
.btn{width:100%;padding:13px;border-radius:12px;border:none;cursor:pointer;font-family:"DM Sans",sans-serif;font-size:14px;font-weight:600;background:linear-gradient(135deg,var(--red),var(--rd));color:#fff;transition:all .2s}
.btn:active{transform:scale(.98)}
.btn:disabled{opacity:.6;cursor:not-allowed}
.spin{width:15px;height:15px;border:2px solid rgba(255,255,255,.35);border-top-color:#fff;border-radius:50%;animation:sp .6s linear infinite;display:inline-block;margin-right:6px;vertical-align:middle}
@keyframes sp{to{transform:rotate(360deg)}}
.alert{padding:11px 13px;border-radius:10px;font-size:13px;margin-bottom:14px;display:none}
.alert.err{display:block;background:#FFF0F0;color:var(--red);border:1px solid #FFCCCC}
.alert.ok{display:block;background:#F0FFF4;color:#166534;border:1px solid #BBF7D0}
#toast{position:fixed;top:16px;left:50%;transform:translateX(-50%) translateY(-70px);background:var(--t1);color:#fff;padding:10px 18px;border-radius:30px;font-size:13px;font-weight:500;z-index:9999;transition:transform .3s;white-space:nowrap;max-width:88vw;pointer-events:none}
#toast.show{transform:translateX(-50%) translateY(0)}
.loader{text-align:center;padding:40px 20px;color:var(--mu);font-size:13px}
.loader svg{animation:sp 1s linear infinite;display:block;margin:0 auto 10px}
</style>
</head>
<body>
<div id="toast"></div>

<div class="topbar">
  <button class="back" onclick="go('dashboard.html')"><svg viewBox="0 0 24 24"><polyline points="15 18 9 12 15 6"/></svg></button>
  <div><h1>Historique</h1><p>Toutes vos transactions</p></div>
</div>
<div class="content">

  <!-- Filtre -->
  <div style="display:flex;gap:8px;margin-bottom:14px;flex-wrap:wrap">
    <button class="filter-btn on" onclick="filterTx('all',this)">Tout</button>
    <button class="filter-btn" onclick="filterTx('depot',this)">Dépôts</button>
    <button class="filter-btn" onclick="filterTx('retrait',this)">Retraits</button>
    <button class="filter-btn" onclick="filterTx('revenu',this)">Revenus</button>
    <button class="filter-btn" onclick="filterTx('commission',this)">Commissions</button>
  </div>

  <!-- Résumé -->
  <div class="card" style="display:grid;grid-template-columns:1fr 1fr;gap:0;padding:0;overflow:hidden">
    <div style="padding:13px;border-right:1px solid var(--bo);text-align:center">
      <div id="total-in" style="font-family:'Cormorant Garamond',serif;font-size:18px;font-weight:700;color:#16A34A">0</div>
      <div style="font-size:10px;color:var(--mu);margin-top:2px">Total reçu (FCFA)</div>
    </div>
    <div style="padding:13px;text-align:center">
      <div id="total-out" style="font-family:'Cormorant Garamond',serif;font-size:18px;font-weight:700;color:var(--red)">0</div>
      <div style="font-size:10px;color:var(--mu);margin-top:2px">Total retiré (FCFA)</div>
    </div>
  </div>

  <!-- Liste -->
  <div id="tx-list">
    <div class="loader">
      <svg width="28" height="28" fill="none" stroke="var(--mu)" stroke-width="2" viewBox="0 0 24 24"><polyline points="12 8 12 12 14 14"/><path d="M3.05 11a9 9 0 1 0 .5-4.5"/></svg>
      Chargement des transactions...
    </div>
  </div>
</div>

<style>
.filter-btn{padding:7px 14px;border-radius:20px;border:1.5px solid var(--bo);font-family:"DM Sans",sans-serif;font-size:12px;font-weight:500;color:var(--mu);background:#fff;cursor:pointer;transition:all .2s}
.filter-btn.on{border-color:var(--red);color:var(--red);background:#FFF0F0}
.tx-item{display:flex;align-items:center;gap:12px;background:#fff;border-radius:13px;padding:13px 14px;margin-bottom:9px;border:1px solid var(--bo)}
.tx-ico{width:42px;height:42px;border-radius:12px;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:20px}
.tx-desc{font-size:13.5px;font-weight:500;color:var(--t1)}
.tx-date{font-size:11px;color:var(--mu);margin-top:2px}
.tx-amt{font-size:14.5px;font-weight:700;text-align:right;flex-shrink:0}
.tx-status{font-size:10px;font-weight:600;padding:2px 7px;border-radius:20px;margin-top:3px;display:inline-block}
</style>

<script>
var sb=null,currentUser=null;
try{sb=supabase.createClient('https://mzxxfxkryhxnycewyryv.supabase.co','eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im16eHhmeGtyeWh4bnljZXd5cnl2Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzk1OTE0NTUsImV4cCI6MjA5NTE2NzQ1NX0.LrdnZCvNDViY5fyh0LEh4HHPTYjN_DI7knjfTIUL8cc');}catch(e){}
function toast(m){var t=document.getElementById('toast');t.textContent=m;t.classList.add('show');setTimeout(function(){t.classList.remove('show');},2600);}
function go(u){window.location.href=u;}
async function initAuth(r){
  try{if(!sb)return null;var s=await sb.auth.getSession();if(!s.data||!s.data.session){go(r||'index.html');return null;}currentUser=s.data.session.user;return currentUser;}
  catch(e){return null;}
}
var allTx = [];

window.addEventListener('DOMContentLoaded', async function() {
  var u = await initAuth('index.html');
  if (!u) return;
  try {
    var r = await sb.from('transactions').select('*').eq('user_id', u.id).order('created_at', {ascending: false}).limit(100);
    if (r.data) {
      allTx = r.data;
      renderTx(allTx);
      // Totals
      var tin = allTx.filter(function(t){ return ['depot','revenu','commission','bonus'].includes(t.type) && t.status==='success'; }).reduce(function(s,t){ return s+(t.amount||0); },0);
      var tout = allTx.filter(function(t){ return t.type==='retrait' && t.status==='success'; }).reduce(function(s,t){ return s+(t.net_amount||t.amount||0); },0);
      document.getElementById('total-in').textContent = tin.toLocaleString('fr-FR');
      document.getElementById('total-out').textContent = tout.toLocaleString('fr-FR');
    }
  } catch(e) {}
});

var ICONS = {depot:'💰',retrait:'📤',revenu:'📈',commission:'🤝',bonus:'🎁'};
var COLORS = {depot:'#F0FFF4',retrait:'#FFF0F0',revenu:'#EFF6FF',commission:'#FDF4FF',bonus:'#FFF7ED'};
var AMTCOL = {depot:'#16A34A',retrait:'#C41C1C',revenu:'#2563EB',commission:'#7C3AED',bonus:'#D97706'};
var STATUS_STYLE = {
  success:'background:#F0FFF4;color:#166534',
  pending:'background:#FFF7ED;color:#92400E',
  failed:'background:#FFF0F0;color:#C41C1C',
  cancelled:'background:#F3F4F6;color:#6B7280'
};
var STATUS_LBL = {success:'Succès',pending:'En attente',failed:'Échoué',cancelled:'Annulé'};

function renderTx(list) {
  var div = document.getElementById('tx-list');
  if (!list || !list.length) {
    div.innerHTML = '<div style="text-align:center;padding:40px 20px;color:var(--mu);font-size:13px"><svg width="44" height="44" fill="none" stroke="currentColor" stroke-width="1.4" viewBox="0 0 24 24" style="display:block;margin:0 auto 12px;opacity:.3"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>Aucune transaction</div>';
    return;
  }
  // Group by date
  var groups = {};
  list.forEach(function(t) {
    var d = new Date(t.created_at).toLocaleDateString('fr-FR', {day:'2-digit',month:'long',year:'numeric'});
    if (!groups[d]) groups[d] = [];
    groups[d].push(t);
  });
  var html = '';
  Object.keys(groups).forEach(function(date) {
    html += '<div style="font-size:11px;font-weight:600;color:var(--mu);letter-spacing:.08em;text-transform:uppercase;margin:14px 0 8px 2px">'+date+'</div>';
    groups[date].forEach(function(t) {
      var sign = ['depot','revenu','commission','bonus'].includes(t.type) ? '+' : '-';
      var amt = t.type==='retrait' ? (t.net_amount||t.amount) : t.amount;
      var st = t.status || 'pending';
      html += '<div class="tx-item">'
        + '<div class="tx-ico" style="background:'+( COLORS[t.type]||'#F3F4F6')+'">'+( ICONS[t.type]||'💳')+'</div>'
        + '<div style="flex:1"><div class="tx-desc">'+(t.description||t.type)+'</div>'
        + (t.phone ? '<div class="tx-date">'+t.phone+'</div>' : '')
        + '<div class="tx-date">'+new Date(t.created_at).toLocaleTimeString('fr-FR',{hour:'2-digit',minute:'2-digit'})+'</div>'
        + '<span class="tx-status" style="'+STATUS_STYLE[st]+'">'+STATUS_LBL[st]+'</span></div>'
        + '<div class="tx-amt" style="color:'+(AMTCOL[t.type]||'#000')+'">'+sign+amt.toLocaleString('fr-FR')+' F</div>'
        + '</div>';
    });
  });
  div.innerHTML = html;
}

function filterTx(type, btn) {
  document.querySelectorAll('.filter-btn').forEach(function(b){ b.classList.remove('on'); });
  btn.classList.add('on');
  if (type === 'all') renderTx(allTx);
  else renderTx(allTx.filter(function(t){ return t.type === type; }));
}
</script></body></html>
