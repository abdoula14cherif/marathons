<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Admin</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
body{margin:0;font-family:Arial;background:#0f172a;color:#fff}
.box{padding:15px}
.card{background:#1e293b;padding:12px;margin-bottom:10px;border-radius:10px}
input,select{width:100%;padding:10px;margin-top:5px;border-radius:8px;border:none}
button{padding:10px;border:none;border-radius:8px;margin-top:8px;cursor:pointer}
.green{background:#22c55e;color:#fff}
.red{background:#ef4444;color:#fff}
.blue{background:#3b82f6;color:#fff}
.user{background:#111827;padding:10px;margin-top:10px;border-radius:8px}
</style>
</head>

<body>

<div class="box">

<!-- LOGIN -->
<div class="card" id="loginBox">
  <h3>Admin Login</h3>
  <input id="email" placeholder="Email">
  <input id="password" type="password" placeholder="Mot de passe">
  <button class="green" onclick="login()">Connexion</button>
</div>

<!-- PANEL -->
<div class="card" id="panel" style="display:none">
  <h3>Users</h3>
  <button class="blue" onclick="loadUsers()">Reload</button>
  <div id="users"></div>
</div>

<!-- EDIT -->
<div class="card" id="editBox" style="display:none">
  <h3>Edit user</h3>

  <div id="info"></div>

  <label>VIP</label>
  <select id="vip">
    <option value="0">Starter</option>
    <option value="1">Bronze</option>
    <option value="2">Silver</option>
    <option value="3">Gold</option>
    <option value="4">Premium</option>
    <option value="5">VIP</option>
    <option value="6">COLD</option>
  </select>

  <label>Solde (+ ou -)</label>
  <input id="balance" type="number">

  <button class="green" onclick="save()">Save</button>
  <button class="red" onclick="closeEdit()">Close</button>
</div>

</div>

<script>

const sb = supabase.createClient(
  "https://mzxxfxkryhxnycewyryv.supabase.co",
  "TON_ANON_KEY"
);

let editId = null;

// LOGIN ADMIN
async function login(){

  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;

  const { data, error } = await sb.auth.signInWithPassword({
    email, password
  });

  if(error){
    alert("Login incorrect");
    return;
  }

  const user = data.user;

  // 🔒 sécurité admin
  if(user.email !== "admin@marathon.com"){
    alert("Accès refusé");
    await sb.auth.signOut();
    return;
  }

  document.getElementById("loginBox").style.display = "none";
  document.getElementById("panel").style.display = "block";

  loadUsers();
}

// LOAD USERS
async function loadUsers(){

  const { data } = await sb.from("profiles").select("*");

  const box = document.getElementById("users");
  box.innerHTML = "";

  data.forEach(u => {

    const div = document.createElement("div");
    div.className = "user";

    div.innerHTML = `
      <b>${u.full_name || "User"}</b><br>
      ${u.balance || 0} FCFA<br>
      VIP: ${u.level || 0}<br>

      <button class="blue" onclick="edit('${u.id}',${u.level || 0})">
        Edit
      </button>
    `;

    box.appendChild(div);
  });
}

// EDIT USER
function edit(id,level){

  editId = id;

  document.getElementById("panel").style.display = "none";
  document.getElementById("editBox").style.display = "block";

  document.getElementById("vip").value = level;
  document.getElementById("balance").value = 0;
}

// SAVE
async function save(){

  const vip = document.getElementById("vip").value;
  const bal = parseInt(document.getElementById("balance").value || 0);

  const { data } = await sb.from("profiles")
    .select("balance")
    .eq("id", editId)
    .single();

  const newBal = (data.balance || 0) + bal;

  await sb.from("profiles")
    .update({
      level: vip,
      balance: newBal
    })
    .eq("id", editId);

  alert("Updated ✓");

  closeEdit();
  loadUsers();
}

function closeEdit(){
  document.getElementById("editBox").style.display = "none";
  document.getElementById("panel").style.display = "block";
}

</script>

</body>
</html>
