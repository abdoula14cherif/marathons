<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Admin Panel - Marathon</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
body{
  font-family: Arial;
  margin:0;
  background:#0f172a;
  color:white;
}

.header{
  padding:20px;
  background:#111c33;
  font-size:20px;
  font-weight:bold;
}

.container{
  padding:15px;
  display:grid;
  gap:12px;
}

.card{
  background:#1e293b;
  padding:12px;
  border-radius:12px;
}

input, select{
  width:100%;
  padding:10px;
  margin-top:6px;
  border-radius:8px;
  border:none;
}

button{
  width:100%;
  padding:10px;
  margin-top:8px;
  border:none;
  border-radius:8px;
  cursor:pointer;
  font-weight:bold;
}

.btn1{background:#22c55e;color:white}
.btn2{background:#ef4444;color:white}
.btn3{background:#3b82f6;color:white}

.user{
  padding:10px;
  background:#0b1220;
  border-radius:10px;
  margin-top:10px;
}

.small{font-size:12px;color:#94a3b8}
</style>
</head>

<body>

<div class="header">⚙️ ADMIN PANEL MARATHON</div>

<div class="container">

<!-- LOGIN SIMPLE -->
<div class="card" id="loginBox">
  <h3>Connexion Admin</h3>
  <input id="email" placeholder="Email admin">
  <input id="password" type="password" placeholder="Mot de passe">
  <button class="btn1" onclick="login()">Connexion</button>
</div>

<!-- DASHBOARD -->
<div class="card" id="panel" style="display:none">

  <h3>Liste utilisateurs</h3>
  <button class="btn3" onclick="loadUsers()">🔄 Refresh</button>

  <div id="users"></div>

</div>

<!-- EDIT USER -->
<div class="card" id="editor" style="display:none">
  <h3>Modifier utilisateur</h3>

  <div class="small" id="uinfo"></div>

  <label>VIP Plan</label>
  <select id="vip">
    <option value="0">Starter</option>
    <option value="1">Bronze</option>
    <option value="2">Silver</option>
    <option value="3">Gold</option>
    <option value="4">Premium</option>
    <option value="5">VIP</option>
    <option value="6">COLD</option>
  </select>

  <label>Modifier solde</label>
  <input id="balance" type="number" placeholder="Ex: +5000 ou -2000">

  <button class="btn1" onclick="saveUser()">Sauvegarder</button>
  <button class="btn2" onclick="closeEditor()">Fermer</button>
</div>

</div>

<script>

// =====================
// SUPABASE
// =====================
const sb = supabase.createClient(
  "https://mzxxfxkryhxnycewyryv.supabase.co",
  "TON_ANON_KEY"
);

let currentUserId = null;

// =====================
// LOGIN (simple admin)
// =====================
async function login(){

  const email = document.getElementById('email').value;
  const password = document.getElementById('password').value;

  const { data, error } = await sb.auth.signInWithPassword({
    email,
    password
  });

  if(error){
    alert("Erreur login");
    return;
  }

  document.getElementById('loginBox').style.display = 'none';
  document.getElementById('panel').style.display = 'block';

  loadUsers();
}

// =====================
// LOAD USERS
// =====================
async function loadUsers(){

  const { data, error } = await sb
    .from('profiles')
    .select('*')
    .order('created_at', {ascending:false});

  if(error){
    alert("Erreur chargement");
    return;
  }

  const box = document.getElementById('users');
  box.innerHTML = '';

  data.forEach(u => {

    const div = document.createElement('div');
    div.className = "user";

    div.innerHTML = `
      <b>${u.full_name || "Utilisateur"}</b><br>
      <span class="small">${u.id}</span><br>
      💰 ${u.balance || 0} FCFA<br>
      ⭐ VIP: ${u.level || 0}<br>

      <button class="btn3" onclick="editUser('${u.id}','${u.full_name}',${u.balance || 0},${u.level || 0})">
        Modifier
      </button>
    `;

    box.appendChild(div);
  });
}

// =====================
// EDIT USER
// =====================
function editUser(id,name,balance,level){

  currentUserId = id;

  document.getElementById('panel').style.display = 'none';
  document.getElementById('editor').style.display = 'block';

  document.getElementById('uinfo').innerText =
    name + " (" + id + ")";

  document.getElementById('balance').value = 0;
  document.getElementById('vip').value = level;
}

// =====================
// SAVE USER
// =====================
async function saveUser(){

  const vip = parseInt(document.getElementById('vip').value);
  const balanceChange = parseInt(document.getElementById('balance').value || 0);

  // get current data
  const { data } = await sb
    .from('profiles')
    .select('*')
    .eq('id', currentUserId)
    .single();

  let newBalance = (data.balance || 0) + balanceChange;

  const { error } = await sb
    .from('profiles')
    .update({
      level: vip,
      balance: newBalance
    })
    .eq('id', currentUserId);

  if(error){
    alert("Erreur update");
    return;
  }

  alert("Utilisateur mis à jour ✓");
  closeEditor();
  loadUsers();
}

// =====================
// CLOSE
// =====================
function closeEditor(){
  document.getElementById('editor').style.display = 'none';
  document.getElementById('panel').style.display = 'block';
}

</script>

</body>
</html>
