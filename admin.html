<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Marathon — Admin</title>

<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600;700&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet"/>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:"DM Sans";background:#f7f2ec;color:#1a1212;padding-bottom:80px}

.topbar{
background:linear-gradient(135deg,#9E1616,#C41C1C);
padding:35px 16px;color:#fff;
}
.topbar h1{font-family:"Cormorant Garamond";font-size:30px}

.content{padding:16px}

.card{
background:#fff;border-radius:16px;padding:16px;
margin-bottom:15px;border:1px solid rgba(0,0,0,.08)
}

.table-wrap{overflow:auto}
table{width:100%;min-width:700px;border-collapse:collapse}
th,td{padding:10px;border-bottom:1px solid #eee;font-size:13px}
th{background:#faf7f5;text-transform:uppercase;font-size:11px}

.badge{padding:4px 10px;border-radius:20px;font-size:11px}
.pending{background:#fff7ed;color:#b45309}
.success{background:#f0fff4;color:#166534}
.danger{background:#fff0f0;color:#b91c1c}
.vip{background:#ede9fe;color:#6d28d9}

input,select{
padding:6px;border-radius:8px;border:1px solid #ddd;
width:100%;
}
.btn{
padding:6px 10px;border:none;border-radius:8px;
font-size:12px;font-weight:600;cursor:pointer;margin:2px
}
.btn-ok{background:#dcfce7}
.btn-no{background:#fee2e2}
.btn-edit{background:#dbeafe}
</style>
</head>

<body>

<div class="topbar">
<h1>Dashboard Admin</h1>
<p>Gestion sécurisée Marathon</p>
</div>

<div class="content">

<div class="card">
<h3>Utilisateurs</h3>
<div class="table-wrap">
<table>
<thead>
<tr>
<th>Nom</th><th>Téléphone</th><th>Niveau</th><th>Solde</th><th>Parrain</th><th>Action</th>
</tr>
</thead>
<tbody id="users-body"></tbody>
</table>
</div>
</div>

</div>

<script>
const sb = supabase.createClient(
'https://mzxxfxkryhxnycewyryv.supabase.co',
'TON_ANON_KEY_ICI'
);

let allUsers = [];

/* START SAFE LOAD */
window.addEventListener("DOMContentLoaded", async () => {
try {
await loadUsers();
} catch (e) {
console.error("INIT ERROR:", e);
}
});

/* =========================
CHECK SAFE DATA FUNCTION
========================= */
function safeArray(data){
return Array.isArray(data) ? data : [];
}

/* =========================
LOAD USERS (ROBUST)
========================= */
async function loadUsers(){

const {data, error} = await sb
.from('profiles')
.select('*');

if(error){
console.error("SUPABASE ERROR:", error);
document.getElementById("users-body").innerHTML =
"<tr><td colspan='6'>Erreur chargement utilisateurs</td></tr>";
return;
}

allUsers = safeArray(data);

if(allUsers.length === 0){
document.getElementById("users-body").innerHTML =
"<tr><td colspan='6'>Aucun utilisateur trouvé</td></tr>";
return;
}

renderUsers(allUsers);
}

/* =========================
RENDER USERS
========================= */
function renderUsers(users){

const body = document.getElementById("users-body");
body.innerHTML = "";

users.forEach(u => {

body.innerHTML += `
<tr>
<td><input value="${u.full_name || ''}" onchange="update('${u.id}','full_name',this.value)"></td>

<td><input value="${u.phone || ''}" onchange="update('${u.id}','phone',this.value)"></td>

<td>
<select onchange="update('${u.id}','level',this.value)">
<option ${u.level==='Starter'?'selected':''}>Starter</option>
<option ${u.level==='VIP'?'selected':''}>VIP</option>
<option ${u.level==='VIP2'?'selected':''}>VIP2</option>
<option ${u.level==='VIP3'?'selected':''}>VIP3</option>
</select>
</td>

<td><input type="number" value="${u.balance || 0}" onchange="update('${u.id}','balance',this.value)"></td>

<td><input value="${u.referred_by || ''}" onchange="update('${u.id}','referred_by',this.value)"></td>

<td>
<button class="btn btn-edit" onclick="alert('Sauvegardé automatiquement')">OK</button>
</td>
</tr>
`;
});
}

/* =========================
UPDATE FIELD SAFE
========================= */
async function update(id, field, value){

const {error} = await sb
.from('profiles')
.update({[field]: value})
.eq('id', id);

if(error){
console.error("UPDATE ERROR:", error);
alert("Erreur modification");
}
}
</script>

</body>
</html>
