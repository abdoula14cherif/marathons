<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Marathon — Admin</title>

<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600;700&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet"/>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
--red:#C41C1C;
--rd:#9E1616;
--cr:#F7F2EC;
--mu:#8A7070;
--bo:rgba(196,28,28,.12);
--t1:#1A1212;
}

body{
font-family:"DM Sans",sans-serif;
background:var(--cr);
color:var(--t1);
padding-bottom:80px;
}

.topbar{
background:linear-gradient(135deg,var(--rd),var(--red));
padding:40px 16px 20px;
color:#fff;
}

.topbar h1{
font-family:"Cormorant Garamond",serif;
font-size:32px;
}

.content{padding:16px}

.stats{
display:grid;
grid-template-columns:repeat(2,1fr);
gap:12px;
margin-bottom:16px;
}

.stat{
background:#fff;
border-radius:16px;
padding:16px;
border:1px solid var(--bo);
}

.stat .v{font-size:24px;font-weight:700;color:var(--red)}

.card{
background:#fff;
border-radius:18px;
padding:18px;
border:1px solid var(--bo);
margin-bottom:16px;
}

table{width:100%;border-collapse:collapse;min-width:700px}

th,td{
padding:10px;
font-size:13px;
border-bottom:1px solid #eee;
}

th{background:#faf7f5;color:var(--mu);text-transform:uppercase;font-size:11px}

.btn{
padding:6px 10px;
border:none;
border-radius:8px;
cursor:pointer;
font-size:12px;
margin:2px;
}

.btn-ok{background:#DCFCE7}
.btn-remove{background:#111;color:#fff}

select,input{
padding:6px;
border-radius:8px;
border:1px solid #ddd;
}
</style>
</head>

<body>

<div class="topbar">
<h1>Dashboard Admin</h1>
<p>Gestion complète système</p>
</div>

<div class="content">

<div class="stats">
<div class="stat"><div class="v" id="total-users">0</div><div>Utilisateurs</div></div>
<div class="stat"><div class="v" id="pending-deposits">0</div><div>Recharges</div></div>
<div class="stat"><div class="v" id="vip-users">0</div><div>VIP</div></div>
<div class="stat"><div class="v" id="total-refs">0</div><div>Parrainages</div></div>
</div>

<input id="search" placeholder="Rechercher..." oninput="filterUsers()" style="width:100%;padding:10px;margin-bottom:10px"/>

<div class="card">
<h3>Utilisateurs</h3>
<table>
<thead>
<tr>
<th>Nom</th>
<th>Téléphone</th>
<th>Niveau</th>
<th>Solde</th>
<th>Parrain</th>
<th>Actions</th>
</tr>
</thead>
<tbody id="users-body"></tbody>
</table>
</div>

<div class="card">
<h3>Recharges</h3>
<table>
<thead>
<tr>
<th>Utilisateur</th>
<th>Montant</th>
<th>Statut</th>
</tr>
</thead>
<tbody id="deposit-body"></tbody>
</table>
</div>

</div>

<script>
const sb = supabase.createClient(
'https://mzxxfxkryhxnycewyryv.supabase.co',
'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im16eHhmeGtyeWh4bnljZXd5cnl2Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzk1OTE0NTUsImV4cCI6MjA5NTE2NzQ1NX0.LrdnZCvNDViY5fyh0LEh4HHPTYjN_DI7knjfTIUL8cc'
);

let allUsers = [];

window.onload = async () => {
await checkAdmin();
await loadAll();
};

async function checkAdmin() {
const { data } = await sb.auth.getSession();
const session = data?.session;

if(!session){
location.href="index.html";
return;
}

const email = session.user.email.toLowerCase();

const admins = [
"abdoula13cherif@gmail.com",
"marieedoh@gmail.com"
];

if(!admins.includes(email)){
alert("Accès refusé");
location.href="dashboard.html";
}
}

async function loadAll(){
await loadUsers();
await loadDeposits();
await loadStats();
}

async function loadStats(){
const { data: users=[] } = await sb.from('profiles').select('*');
const { data: deposits=[] } = await sb.from('transactions').select('*').eq('type','depot');

document.getElementById('total-users').textContent = users.length;
document.getElementById('pending-deposits').textContent = deposits.filter(d=>d.status==='pending').length;
document.getElementById('vip-users').textContent = users.filter(u=>u.level!=='Starter').length;
document.getElementById('total-refs').textContent = users.filter(u=>u.referred_by).length;
}

async function loadUsers(){
const { data=[] } = await sb.from('profiles').select('*');

allUsers = data;

renderUsers(data);
}

function renderUsers(users){
const body = document.getElementById('users-body');
body.innerHTML='';

users.forEach(u=>{
body.innerHTML += `
<tr>
<td>${u.full_name||'-'}</td>
<td>${u.phone||'-'}</td>

<td>
<select onchange="changeVip('${u.id}',this.value)">
<option ${u.level==='Starter'?'selected':''}>Starter</option>
<option ${u.level==='VIP1'?'selected':''}>VIP1</option>
<option ${u.level==='VIP2'?'selected':''}>VIP2</option>
<option ${u.level==='VIP3'?'selected':''}>VIP3</option>
</select>
</td>

<td>
<input type="number" id="bal-${u.id}" value="${u.balance||0}" style="width:80px"/>
<button class="btn btn-ok" onclick="updateBalance('${u.id}')">OK</button>
</td>

<td>${u.referred_by||'-'}</td>

<td>
<button class="btn btn-remove" onclick="deleteUser('${u.id}')">Supprimer</button>
</td>
</tr>
`;
});
}

async function changeVip(id,level){
await sb.from('profiles').update({level}).eq('id',id);
loadAll();
}

async function updateBalance(id){
const val=document.getElementById(`bal-${id}`).value;
await sb.from('profiles').update({balance:Number(val)}).eq('id',id);
loadAll();
}

async function deleteUser(id){
if(!confirm("Supprimer ?"))return;
await sb.from('profiles').delete().eq('id',id);
loadAll();
}

function filterUsers(){
const q=document.getElementById('search').value.toLowerCase();
renderUsers(allUsers.filter(u=>
(u.full_name||'').toLowerCase().includes(q) ||
(u.phone||'').toLowerCase().includes(q)
));
}

async function loadDeposits(){
const { data=[] } = await sb.from('transactions').select('*').eq('type','depot');

const body=document.getElementById('deposit-body');
body.innerHTML='';

data.forEach(t=>{
body.innerHTML+=`
<tr>
<td>${t.user_name||'User'}</td>
<td>${t.amount}</td>
<td>${t.status}</td>
</tr>`;
});
}
</script>

</body>
</html>
